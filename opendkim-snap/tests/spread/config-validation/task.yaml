summary: Verify opendkim accepts valid config and rejects invalid config

execute: |
  snap_data="/var/snap/opendkim/current"
  tmpdir=$(mktemp -d "$snap_data/${SNAP_NAME}-config-XXXXXX")
  trap 'rm -rf "$tmpdir"' EXIT

  good_cfg="$tmpdir/opendkim.good.conf"
  bad_cfg="$tmpdir/opendkim.bad.conf"

  echo "Testing valid configuration..."
  printf '%s\n' \
    'Syslog                  yes' \
    'UMask                   007' \
    'Canonicalization        relaxed/simple' \
    'Mode                    sv' \
    'Socket                  local:/var/snap/opendkim/current/run/opendkim/opendkim.sock' \
    'PidFile                 /var/snap/opendkim/current/run/opendkim/opendkim.pid' \
    'UserID                  root' \
    > "$good_cfg"

  snap run "${SNAP_NAME}.opendkim" -n -x "$good_cfg"

  echo "Testing invalid configuration..."
  printf '%s\n' 'ThisDirectiveDoesNotExist yes' > "$bad_cfg"
  ! snap run "${SNAP_NAME}.opendkim" -n -x "$bad_cfg"

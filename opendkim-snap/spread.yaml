project: opendkim-snap

path: /root/spread/opendkim-snap

environment:
  PROJECT_PATH: /root/spread/opendkim-snap
  CRAFT_ARTIFACT: '$(HOST: echo "$CRAFT_ARTIFACT")'

backends:
  ci:
    type: adhoc
    systems:
      - ubuntu-24.04:
          username: root
          password: $SPREAD_PASSWORD
    allocate: ADDRESS $(spread/.extension allocate ci)
    discard: ./spread/.extension discard ci
    prepare: "$PROJECT_PATH/spread/.extension backend-prepare"
    restore: "$PROJECT_PATH/spread/.extension backend-restore"
    prepare-each: "$PROJECT_PATH/spread/.extension backend-prepare-each"
    restore-each: "$PROJECT_PATH/spread/.extension backend-restore-each"

suites:
  tests/spread/:
    summary: Snap smoke and upstream-inspired behavior tests
    environment:
      SNAP_NAME: opendkim
    prepare-each: |
      if [ -z "$CRAFT_ARTIFACT" ]; then
        echo "CRAFT_ARTIFACT is not set" >&2
        exit 1
      fi
      snap install --dangerous --devmode "$CRAFT_ARTIFACT"
    restore-each: |
      snap remove --purge "$SNAP_NAME" || true

project: opendkim-snap

backends:
  craft:
    type: craft
    systems:
      - ubuntu-24.04

suites:
  spread/general/:
    summary: Snap smoke and upstream-inspired behavior tests
    environment:
      SNAP_NAME: opendkim
    prepare-each: |
      snap install "$CRAFT_ARTIFACT" --dangerous --jailmode
    restore-each: |
      snap remove --purge "$SNAP_NAME" || true

exclude:
  - .git

kill-timeout: 1h

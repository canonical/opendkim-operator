project: opendkim-snap

path: /root/spread/opendkim-snap

backends:
  craft:
    type: craft
    systems:
      - ubuntu-24.04

  ci:
    type: external
    systems:
      - ubuntu-24.04:
          username: root
          password: $SPREAD_PASSWORD
    allocate: spread/.extension allocate ci
    discard: spread/.extension discard ci
    prepare: spread/.extension backend-prepare
    restore: spread/.extension backend-restore
    prepare-each: spread/.extension backend-prepare-each
    restore-each: spread/.extension backend-restore-each

suites:
  tests/spread/:
    summary: Snap smoke and upstream-inspired behavior tests
    environment:
      SNAP_NAME: opendkim
    prepare-each: |
      SNAP_FILE="${CRAFT_ARTIFACT:-}"
      if [ -z "$SNAP_FILE" ]; then
        echo "CRAFT_ARTIFACT is not set" >&2
        exit 1
      fi
      snap install --dangerous --devmode "$SNAP_FILE"
    restore-each: |
      snap remove --purge "$SNAP_NAME" || true

name: opendkim
base: core24
version: '2.11.0-beta2'
summary: DKIM email signing and verification milter for MTAs
description: |
  OpenDKIM is an open-source implementation of the DKIM (DomainKeys Identified
  Mail) sender authentication system. It provides a milter-based filter that
  signs outgoing email with a private key and verifies incoming email signatures
  against published DNS records, helping to authenticate the origin of messages
  and protect against spoofing.
grade: devel
confinement: strict

platforms:
  amd64:

apps:
  opendkim:
    command: usr/sbin/opendkim
    plugs:
      - network
      - network-bind
      - log-observe
      - system-observe

  daemon:
    command: usr/sbin/opendkim -f -x /var/snap/opendkim/current/etc/opendkim.conf
    daemon: simple
    plugs:
      - network
      - network-bind
      - log-observe
      - system-observe

  genkey:
    command: usr/sbin/opendkim-genkey
    environment:
      PERL5LIB: $SNAP/usr/share/perl5:$SNAP/usr/share/perl/5.38.2:$SNAP/usr/lib/x86_64-linux-gnu/perl/5.38.2:$SNAP/usr/lib/x86_64-linux-gnu/perl5/5.38
    plugs: [network, home]

  testkey:
    command: usr/sbin/opendkim-testkey
    plugs: [network]

layout:
  /usr/share/dns/root.key:
    bind-file: $SNAP/usr/share/dns/root.key
  /etc/opendkim.conf:
    bind-file: $SNAP_DATA/etc/opendkim.conf
  /etc/dkimkeys:
    bind: $SNAP_DATA/etc/dkimkeys

parts:
  opendkim:
    plugin: autotools
    source: https://github.com/trusteddomainproject/OpenDKIM.git
    source-tag: 2.11.0-Beta2
    build-packages:
      - autoconf
      - automake
      - build-essential
      - libmilter-dev
      - libssl-dev
      - libtool
      - pkg-config
    stage-packages:
      - libmilter1.0.1
      - openssl
      - perl
      - dns-root-data
    autotools-configure-parameters:
      - --prefix=/usr
      - --sysconfdir=/etc
      - --localstatedir=/var
      - --sbindir=/usr/sbin
    override-build: |
      autoreconf -fi
      craftctl default
      mkdir -p $CRAFT_PART_INSTALL/etc/dkimkeys
      mkdir -p $CRAFT_PART_INSTALL/run/opendkim

      # Install default config from whichever source path exists
      for sample in opendkim/opendkim.conf.sample opendkim.conf.sample; do
        if [ ! -f $CRAFT_PART_INSTALL/etc/opendkim.conf ] && [ -f "$sample" ]; then
          install -Dm644 "$sample" $CRAFT_PART_INSTALL/etc/opendkim.conf
        fi
      done

      if [ -f $CRAFT_PART_INSTALL/etc/opendkim.conf ]; then
        sed -i 's/^UserID.*/#UserID snap_daemon/' $CRAFT_PART_INSTALL/etc/opendkim.conf
        sed -i 's/^UMask.*/UMask 002/' $CRAFT_PART_INSTALL/etc/opendkim.conf
        sed -i 's|/run/opendkim|/var/snap/opendkim/current/run/opendkim|g' $CRAFT_PART_INSTALL/etc/opendkim.conf
      fi

      # Fix perl shebangs for tools
      if [ -f $CRAFT_PART_INSTALL/usr/sbin/opendkim-genkey ]; then
        sed -i 's|^#!/usr/bin/perl|#!/usr/bin/env perl|g' $CRAFT_PART_INSTALL/usr/sbin/opendkim-genkey
      fi

      if [ -f $CRAFT_PART_INSTALL/usr/sbin/opendkim-genstats ]; then
        sed -i 's|^#!/usr/bin/perl|#!/usr/bin/env perl|g' $CRAFT_PART_INSTALL/usr/sbin/opendkim-genstats
      fi

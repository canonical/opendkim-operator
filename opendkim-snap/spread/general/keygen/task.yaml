summary: Verify DKIM key generation, test-mode keys, and short-key rejection

execute: |
  tmpdir=$(mktemp -d "$HOME/opendkim-keygen-XXXXXX")
  trap 'rm -rf "$tmpdir"' EXIT

  selector="default"
  domain="testrelay.internal"

  echo "Running basic key generation..."
  snap run opendkim.genkey -s "$selector" -d "$domain" -D "$tmpdir"

  test -f "$tmpdir/${selector}.private"
  test -f "$tmpdir/${selector}.txt"
  grep -q "BEGIN" "$tmpdir/${selector}.private"

  echo "Running test-mode key generation..."
  selector_test="testmode"
  snap run opendkim.genkey -t -s "$selector_test" -d "$domain" -D "$tmpdir"

  test -f "$tmpdir/${selector_test}.txt"
  grep -q "t=y" "$tmpdir/${selector_test}.txt"

  echo "Verifying short key rejection..."
  short_key_output=$(snap run opendkim.genkey -b 512 -s tooshort -d "$domain" -D "$tmpdir" 2>&1 || true)
  echo "$short_key_output" | grep -qi "minimum 1024-bit keys"

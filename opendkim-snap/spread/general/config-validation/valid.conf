#
# A syntactically valid opendkim configuration used by config-validation tests.
# The paths reference typical snap data directories; they need not exist on disk
# because opendkim -n only validates syntax.

Syslog                  yes
UMask                   007
Canonicalization        relaxed/simple
Mode                    sv
Socket                  local:/tmp/opendkim-test/opendkim.sock
PidFile                 /tmp/opendkim-test/opendkim.pid
UserID                  root

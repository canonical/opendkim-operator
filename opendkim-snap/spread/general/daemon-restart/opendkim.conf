# Minimal opendkim configuration for the daemon-restart spread test.
# __SNAP_NAME__ is replaced at runtime with the actual snap name.

Syslog                  yes
UMask                   007
Mode                    sv
Socket                  inet:8892@localhost
PidFile                 /var/snap/__SNAP_NAME__/current/run/opendkim/opendkim.pid
UserID                  root

header:
  license:
    spdx-id: Apache-2.0
    copyright-owner: Canonical Ltd.
    content: |
      Copyright [year] [owner]
      See LICENSE file for licensing details.
    pattern: |
      Copyright \d{4} Canonical Ltd.
      See LICENSE file for licensing details.
  paths:
  - '**'
  paths-ignore:
  - '.github/**'
  - '**/*.json'
  - '**/*.md'
  - '**/*.txt'
  - '**/.jujuignore'
  - '.gitignore'
  - '.licenserc.yaml'
  - 'CODEOWNERS'
  - 'LICENSE'
  - 'trivy.yaml'
  - '**/pyproject.toml'
  - 'zap_rules.tsv'
  - '**/*.md.j2'
  - '**/lib/charms/**'
  - 'opendkim-operator/templates/opendkim.conf.j2'
  - 'opendkim-operator/tests/unit/files/**'
  - '**/uv.lock'
  - 'opendkim-snap/snap/hooks/**'
  comment: on-failure

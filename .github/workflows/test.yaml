name: Tests

on:
  pull_request:

jobs:
  unit-tests:
    uses: canonical/operator-workflows/.github/workflows/test.yaml@main
    secrets: inherit
    with:
      self-hosted-runner: true
      self-hosted-runner-label: "edge"
      with-uv: true
      working-directory: opendkim-operator

  snap-build:
    name: Build opendkim snap
    uses: canonical/data-platform-workflows/.github/workflows/build_snap.yaml@v42.0.1
    with:
      path-to-snap-project-directory: ./opendkim-snap

  snap-tests:
    name: Snap spread tests
    needs: snap-build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: opendkim-snap
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download snap artifact
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.snap-build.outputs.artifact-prefix }}-*
          merge-multiple: true
          path: opendkim-snap
      - name: Install spread
        run: sudo snap install spread
      - name: Run spread tests
        env:
          SPREAD_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          SNAP_FILE=$(find . -maxdepth 1 -name "*.snap" | head -1)
          if [ -z "$SNAP_FILE" ]; then
            echo "Error: No .snap artifact found in current directory; cannot run spread tests."
            exit 1
          fi
          CRAFT_ARTIFACT="$SNAP_FILE" spread ci:

name: Tests

on:
  pull_request:

jobs:
  unit-tests:
    uses: canonical/operator-workflows/.github/workflows/test.yaml@main
    secrets: inherit
    with:
      self-hosted-runner: true
      self-hosted-runner-label: "edge"
      with-uv: true
      working-directory: opendkim-operator

  snap-tests:
    name: Snap spread tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install snapcraft
        run: sudo snap install snapcraft --classic
      - name: Generate spread .extension
        working-directory: opendkim-snap
        run: |
          tmpdir=$(mktemp -d)
          mkdir -p "$tmpdir/snap"
          cp snap/snapcraft.yaml "$tmpdir/snap/"
          snapcraft init --profile test "$tmpdir"
          cp "$tmpdir/spread/.extension" spread/.extension
          rm -rf "$tmpdir"
      - name: Run spread tests
        run: snapcraft test
        working-directory: opendkim-snap

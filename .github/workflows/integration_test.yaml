name: Integration tests

on:
  pull_request:
  schedule:
  - cron: "0 15 * * SAT"

jobs:
  integration-tests:
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@a93629faf3b31fc0a958fc7034325c9656c28af4
    secrets: inherit
    with:
      extra-arguments: '-x --log-format="%(asctime)s %(levelname)s %(message)s"'
      juju-channel: 3/stable
      modules: '["test_charm.py"]'
      pre-run-script: ./opendkim-operator/tests/integration/setup-integration-tests.sh
      provider: lxd
      self-hosted-runner-label: "edge"
      self-hosted-runner: true
      with-uv: true
      working-directory: opendkim-operator
  allure-report:
    if: ${{ !cancelled() && github.event_name == 'schedule' }}
    needs:
    - integration-tests
    uses: canonical/operator-workflows/.github/workflows/allure_report.yaml@a93629faf3b31fc0a958fc7034325c9656c28af4
